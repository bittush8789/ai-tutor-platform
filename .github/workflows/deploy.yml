name: AI Tutor CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Security scan (Bandit)
      run: |
        pip install bandit
        bandit -r utils/

  deploy-to-kind:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Create KIND Cluster
      uses: helm/kind-action@v1.10.0
      with:
        config: kind-config.yaml

    - name: Build Docker Image
      run: |
        docker build -t ai-tutor-app:latest .

    - name: Load Image into KIND
      run: |
        kind load docker-image ai-tutor-app:latest

    - name: Deploy to K8s
      run: |
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/
        kubectl rollout status deployment/ai-tutor-app -n ai-tutor

    - name: Verify Deployment
      run: |
        kubectl get pods -n ai-tutor
        kubectl get svc -n ai-tutor
