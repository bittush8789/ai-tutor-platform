apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-tutor-ingress
  namespace: ai-tutor
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: ai-tutor.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-tutor-service
            port:
              number: 80
