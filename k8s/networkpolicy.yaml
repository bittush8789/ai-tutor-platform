apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-tutor-network-policy
  namespace: ai-tutor
spec:
  podSelector:
    matchLabels:
      app: ai-tutor
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: ingress-nginx # Assuming nginx ingress controller
    ports:
    - protocol: TCP
      port: 8501
  egress:
  - {} # Allow all egress for LLM API calls and model downloads
