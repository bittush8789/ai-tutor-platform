apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-tutor-app
  namespace: ai-tutor
  labels:
    app: ai-tutor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-tutor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-tutor
    spec:
      serviceAccountName: ai-tutor-sa
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: ai-tutor
        image: ai-tutor-app:latest # Should be replaced by versioned tag in CI
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8501
        envFrom:
        - configMapRef:
            name: ai-tutor-config
        - secretRef:
            name: ai-tutor-secret
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: data-storage
          mountPath: /app/data
        - name: chroma-storage
          mountPath: /app/chroma_db
      volumes:
      - name: data-storage
        persistentVolumeClaim:
          claimName: ai-tutor-data-pvc
      - name: chroma-storage
        persistentVolumeClaim:
          claimName: ai-tutor-chroma-pvc
