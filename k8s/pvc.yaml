apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-tutor-data-pvc
  namespace: ai-tutor
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-tutor-chroma-pvc
  namespace: ai-tutor
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
